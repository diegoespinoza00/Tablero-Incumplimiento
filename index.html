        .stat-val { display: block; font-size: 18px; font-weight: 800; color: var(--azul-mid); }
        .filter-panel { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #E2E8F0; }
        .f-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
        .f-group { display: flex; flex-direction: column; gap: 5px; }
        .f-label { font-size: 11px; font-weight: 700; color: var(--gris); text-transform: uppercase; }
        input, select { padding: 9px; border: 1px solid #CBD5E0; border-radius: 8px; font-size: 12px; background: #fff; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #E2E8F0; }
        thead tr { background: var(--azul); color: #fff; }
        th { padding: 12px 15px; text-align: left; font-size: 11px; text-transform: uppercase; }
        tbody td { padding: 12px 15px; border-bottom: 1px solid #F0F4F8; vertical-align: middle; }
        .r-badge { display: inline-flex; align-items: center; justify-content:center; width: 26px; height: 26px; border-radius: 50%; font-weight: 800; background: #EDF2F7; }
        .r-high { background: var(--critico) !important; color: #fff !important; }
        .name-cell { text-transform: uppercase; font-weight: 700; color: var(--azul); }

function clean(s){ return s ? s.toString().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim() : ""; }

function parseDate(s){ 
    const p = s.split('/'); 
    return new Date(p[2], p[1]-1, p[0]); 
}

function render(){
    const nom = clean(document.getElementById('b-n').value);
    const car = document.getElementById('f-ca').value;
    const cid = document.getElementById('b-id').value;
    const nce = clean(document.getElementById('b-ce').value);
    const dep = document.getElementById('f-de').value;
    const ini = document.getElementById('f-i').value;
    const fin = document.getElementById('f-f').value;

    const counts = {};
    TICKETS.forEach(t => { counts[t.n] = (counts[t.n] || 0) + 1; });

    const agrupados = {};
    TICKETS.forEach(t => {
        const k = t.n.toUpperCase();
        const dReg = parseDate(t.f);
        const mF = (!ini || dReg >= new Date(ini+"T00:00:00")) && (!fin || dReg <= new Date(fin+"T23:59:59"));
        const mD = (dep==='todos' || t.d === dep);
        const mID = (!cid || t.id.includes(cid));
        const mCE = (!nce || clean(t.e).includes(nce));
        const mN = (!nom || clean(t.n).includes(nom));

        if(mF && mD && mID && mCE && mN){
            if(!agrupados[k]){
                agrupados[k] = {...t, n:k, cnt: counts[k]};
            }
        }
    });

    const fil = Object.values(agrupados).filter(e => car === 'todos' || e.c === car);

    document.getElementById('st-dep').innerText = new Set(fil.map(e=>e.d)).size;
    document.getElementById('st-ce').innerText = new Set(fil.map(e=>e.id)).size;
    
    const m = fil.filter(e => e.c === 'Docente');
    const d = fil.filter(e => e.c === 'Director');
    document.getElementById('m-t').innerText = m.length;
    document.getElementById('m-2').innerText = m.filter(e=>e.cnt === 2).length;
    document.getElementById('m-3').innerText = m.filter(e=>e.cnt > 2).length;
    document.getElementById('d-t').innerText = d.length;
    document.getElementById('d-2').innerText = d.filter(e=>e.cnt === 2).length;
    document.getElementById('d-3').innerText = d.filter(e=>e.cnt > 2).length;

    const tr = document.getElementById('res'); tr.innerHTML = '';
    fil.sort((a,b)=> b.cnt - a.cnt).forEach(e => {
        tr.innerHTML += `<tr><td class="name-cell">${e.n}<br><small style="color:#666">${e.c}</small></td><td align="center"><span class="r-badge ${e.cnt>1?'r-high':''}">${e.cnt}</span></td><td>${e.e}</td><td>${e.id}</td><td>${e.d}</td><td>${e.f}</td></tr>`;
    });
}

window.onload = () => {
    [...new Set(TICKETS.map(t=>t.id))].sort().forEach(id => document.getElementById('ids-list').innerHTML += `<option value="${id}">`);
    [...new Set(TICKETS.map(t=>t.d))].sort().forEach(d => document.getElementById('f-de').innerHTML += `<option value="${d}">${d}</option>`);
    render();
}
</script>
