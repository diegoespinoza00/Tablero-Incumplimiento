<style>
:root{--azul:#1B3A6B;--azul-mid:#2E5FA3;--azul-light:#D6E4F7;--verde:#1A6B4A;--verde-light:#D4EDE3;--gris:#4A5568;--gris-light:#EDF2F7;--alerta:#B45309;--alerta-light:#FEF3C7;--critico:#7F1D1D;--critico-light:#FEE2E2;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7FAFC;color:#2D3748;font-size:13px;line-height:1.5;}
.page{max-width:1600px;margin:0 auto;padding:1.5rem;}
.header{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--azul);display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:20px;font-weight:700;color:var(--azul);}

.filter-panel{background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.05); margin-bottom:20px; border:1px solid #E2E8F0;}
.filter-row{display:flex; gap:20px; flex-wrap:wrap; margin-bottom:15px; align-items:center;}
.filter-group{display:flex; flex-direction:column; gap:6px;}
.filter-label{font-size:11px; font-weight:700; color:var(--gris); text-transform:uppercase; letter-spacing:0.5px;}

.chip-group{display:flex; gap:8px;}
.chip{padding:6px 14px; background:var(--gris-light); color:var(--gris); border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; user-select:none; transition:all 0.2s; border:1px solid transparent;}
.chip.active{background:var(--azul); color:#fff;}

input, select{padding:9px 12px; border:1px solid #CBD5E0; border-radius:8px; font-family:inherit; font-size:13px;}

.tabla-wrap{background:#fff;border-radius:10px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--azul-mid);}
th{color:#fff;font-weight:600;padding:12px;text-align:left;cursor:pointer;font-size:11px;text-transform:uppercase;}
tbody td{padding:10px 12px;border-bottom:1px solid #E2E8F0;}
tbody td:first-child{font-weight:700; color:var(--azul);}

.badge{display:inline-block;font-size:10px;padding:3px 8px;border-radius:12px;font-weight:700;}
.crit-critico{background:#FEE2E2; color:#7F1D1D;}
.crit-alto{background:#FFEDD5; color:#9A3412;}
.crit-medio{background:#FEF3C7; color:#92400E;}
.crit-bajo{background:#F1F5F9; color:#475569;}
.count-pill{padding:2px 8px;border-radius:10px;font-weight:800;}
.high{background:var(--critico);color:#fff;}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.kpi{background:#fff;border-radius:8px;padding:15px;border-left:4px solid var(--azul);}
.kpi-value{font-size:22px;font-weight:700;color:var(--azul);}
</style>
</head>

<div class="page">
    <div class="header">
        <div><h1>Consola de Auditoría Docente</h1><p>Vista de Integridad Total (88 registros) — El Salvador 2026</p></div>

    <div class="kpi-row">

        <div class="kpi" style="border-left-color:var(--verde)"><div class="kpi-label">DEPTOS. ACTIVOS</div><div class="kpi-value" id="k4">-</div></div>
    </div>

    <div class="filter-panel">
        <div class="filter-row">
            <div class="filter-group" style="flex:1">
                <label class="filter-label">Búsqueda Global (Nombre, CE o ID)</label>
                <input id="busca" type="text" style="width:100%" placeholder="Escribe para filtrar..." oninput="render()">
            </div>
            <div class="filter-group">
                <label class="filter-label">Cargo</label>
                <div class="chip-group">
                    <div class="chip active" data-v="Director" onclick="toggleChip(this)">Director</div>
                    <div class="chip active" data-v="Docente" onclick="toggleChip(this)">Docente</div>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label">Departamento</label>
                <select id="filtroDep" onchange="render()"><option value="">-- Todos --</option></select>
            </div>
        </div>
        <div class="filter-row">
            <div class="filter-group" style="flex:1">
                <label class="filter-label">Categoría de Incumplimiento</label>
                <select id="filtroCat" style="width:100%" onchange="render()"><option value="">-- Todas las Categorías --</option></select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Rango de Fecha</label>
                <div style="display:flex; gap:8px;">
                    <input type="date" id="fechaIni" onchange="render()">
                    <input type="date" id="fechaFin" onchange="render()">
                    <button class="chip" onclick="resetFechas()">Limpiar Fechas</button>
                </div>
            </div>
        </div>
    </div>

    <div class="tabla-wrap">
        <table>
            <thead>
                <tr>
                    <th onclick="sc('nombre')">Sujeto / ID ↕</th>
                    <th>Cargo</th>
                    <th onclick="sc('veces')">Histórico ↕</th>
                    <th>Cod.</th>
                    <th>Definición de Falta</th>
                    <th>Criticidad</th>
                    <th onclick="sc('fecha')">Fecha ↕</th>
                    <th>Centro Educativo</th>
                    <th>Depto</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

const HISTORIAL = {}; RAW.forEach(r => { if(r.nombre !== "No Definido") HISTORIAL[r.nombre] = (HISTORIAL[r.nombre]||0)+1; });

let f_tipo = new Set(['Director','Docente']), sk='veces', sd=-1;

function parseDate(str) { const p = str.split('/'); return new Date(p[2], p[1]-1, p[0]); }
function toggleChip(el){ el.classList.toggle('active'); const val = el.dataset.v; f_tipo.has(val) ? f_tipo.delete(val) : f_tipo.add(val); render(); }
function resetFechas() { document.getElementById('fechaIni').value = ""; document.getElementById('fechaFin').value = ""; render(); }
function sc(k){ sk===k ? sd*=-1 : (sk=k, sd=-1); render(); }

function render(){
    const txt = document.getElementById('busca').value.toLowerCase();
    const dep = document.getElementById('filtroDep').value;
    const cat = document.getElementById('filtroCat').value;
    const fIni = document.getElementById('fechaIni').value;
    const fFin = document.getElementById('fechaFin').value;

    const filtered = RAW.filter(r => {
        const m = MATRIZ[r.cod] || {cat: "Otro"};
        const matchT = f_tipo.has(r.tipo);
        const matchD = !dep || r.depk === dep;
        const matchC = !cat || m.cat === cat;
        const matchX = !txt || r.nombre.toLowerCase().includes(txt) || r.ce.toLowerCase().includes(txt) || r.id.includes(txt);
        
        let matchF = true;
        if(fIni || fFin){
            const dReg = parseDate(r.fecha_dia);
            if(fIni) matchF = matchF && (dReg >= new Date(fIni + "T00:00:00"));
            if(fFin) matchF = matchF && (dReg <= new Date(fFin + "T23:59:59"));
        }
        return matchT && matchD && matchC && matchX && matchF;
    });

    document.getElementById('k1').innerText = filtered.length;
    document.getElementById('k2').innerText = new Set(filtered.filter(x=>x.nombre!=="No Definido").map(r=>r.nombre)).size;
    document.getElementById('k3').innerText = filtered.filter(r => (MATRIZ[r.cod]||{}).crit === "CRÍTICO").length;
    document.getElementById('k4').innerText = new Set(filtered.map(r=>r.dep)).size;
    
    filtered.sort((a,b) => {
        if(sk === 'veces') return sd * ((HISTORIAL[b.nombre]||0) - (HISTORIAL[a.nombre]||0));
        if(sk === 'nombre') return sd * a.nombre.localeCompare(b.nombre);
        if(sk === 'fecha') return sd * (parseDate(b.fecha_dia) - parseDate(a.fecha_dia));
        return 0;
    });

    const tb = document.getElementById('tbody'); tb.innerHTML = '';
    filtered.forEach(r => {
        const m = MATRIZ[r.cod] || {cat: "Otro", crit: "MEDIO"};
        const displayNombre = r.nombre === "No Definido" ? `<span style="color:#A0AEC0; font-weight:400; font-style:italic;">ID: ${r.id} (Sin asignar)</span>` : r.nombre;
        const vCount = HISTORIAL[r.nombre] || "-";

        tb.innerHTML += `<tr>
            <td>${displayNombre}</td>
            <td><span class="badge ${r.tipo==='Director'?'b-dir':'b-doc'}">${r.tipo}</span></td>
            <td style="text-align:center"><span class="count-pill ${vCount>1?'high':''}">${vCount}</span></td>
            <td>${r.cod}</td>
            <td>${m.cat}</td>
            <td><span class="badge crit-${m.crit.toLowerCase()}">${m.crit}</span></td>
            <td style="font-size:11px; color:var(--gris)">${r.fecha_dia}</td>
            <td style="font-size:11px">${r.ce}</td>
            <td>${r.dep}</td>
        </tr>`;
    });
}

window.onload = () => {
    const dSel = document.getElementById('filtroDep');
    [...new Set(RAW.map(r=>r.depk))].sort().forEach(d => dSel.innerHTML += `<option value="${d}">${d}</option>`);
    const cSel = document.getElementById('filtroCat');
    [...new Set(RAW.map(r => (MATRIZ[r.cod]||{}).cat))].filter(Boolean).sort().forEach(c => cSel.innerHTML += `<option value="${c}">${c}</option>`);
    render();
}
